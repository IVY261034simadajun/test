<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="hero">
    <img src="img/オルフェーヴル.webp" alt="ヘッダー画像">
    <div class="hero-text">
      <h1>Your Name</h1>
      <p>Web Designer / Developer</p>
    </div>
  </header>

  <!-- About -->
  <section class="about">
    <h2>About</h2>
    <p>
      はじめまして。シンプルで使いやすいデザインを意識して
      Web制作をしています。HTML / CSS / JavaScript を中心に勉強中です。
    </p>
  </section>

  <!-- Profile -->
  <section class="profile">
    <h2>Profile</h2>

    <div class="profile-list">
      <div class="item">
        <h3>Name</h3>
        <p>Your Name</p>
      </div>

      <div class="item">
        <h3>Location</h3>
        <p>Oita, Japan</p>
      </div>

      <div class="item">
        <h3>Skills</h3>
        <p>HTML / CSS / JavaScript</p>
      </div>
    </div>
  </section>

  <!-- SNS -->
  <section class="sns">
    <h2>Social</h2>

    <div class="sns-links">
      <a href="#">Twitter</a>
      <a href="#">Instagram</a>
      <a href="#">GitHub</a>
    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>© 2026 My Profile</p>
  </footer>

</body>
</html>
